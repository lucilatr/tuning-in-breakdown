<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuning In — Production Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #FF0066;
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.15);
  --text: #f0f0f0;
  --text-dim: #888;
  --text-dimmer: #444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; min-height: 100vh; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px 14px; border-bottom: 1px solid var(--border);
  gap: 16px; flex-wrap: wrap;
}
.header-left h1 {
  font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase; color: var(--text);
}
.header-left h1 span { color: var(--pink); }
.header-left p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.btn {
  font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border-strong);
  background: var(--surface2); color: var(--text); cursor: pointer; transition: all .15s;
}
.btn:hover { border-color: var(--pink); color: var(--pink); }
.btn.primary { background: var(--pink); border-color: var(--pink); color: #fff; }
.btn.primary:hover { background: #cc0052; border-color: #cc0052; color: #fff; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

.sync-status { font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dimmer); flex-shrink: 0; transition: background .3s; }
.sync-dot.syncing { background: #BA7517; }
.sync-dot.ok { background: #1D9E75; }
.sync-dot.error { background: #D85A30; }

.controls { display: flex; align-items: center; gap: 16px; padding: 10px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-label { font-size: 11px; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dimmer); }
.pill {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase; padding: 3px 12px; border-radius: 20px;
  border: 1px solid var(--border-strong); background: transparent; color: var(--text-dim); cursor: pointer; transition: all .15s;
}
.pill.ap1 { background: rgba(127,119,221,.2); border-color: #7F77DD; color: #a9a3f0; }
.pill.ap2 { background: rgba(29,158,117,.2);  border-color: #1D9E75; color: #5ecba4; }
.pill.ap3 { background: rgba(216,90,48,.2);   border-color: #D85A30; color: #e8845e; }

.legend { display: flex; flex-wrap: wrap; gap: 5px 14px; padding: 8px 24px; border-bottom: 1px solid var(--border); }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); font-family: 'Barlow Condensed', sans-serif; }
.leg-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

.gantt-wrap { overflow-x: auto; padding-bottom: 32px; }
table.gantt { border-collapse: collapse; width: 100%; min-width: 1020px; }
.gantt th, .gantt td { border: 1px solid var(--border); }

.gantt thead th {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: .05em; text-transform: uppercase; color: var(--text-dimmer);
  text-align: center; padding: 5px 3px; background: var(--surface); white-space: nowrap;
}
.gantt thead th.wk { color: var(--text-dim); }
.gantt thead th.day { font-size: 10px; color: #555; }
.gantt thead th.day.we { color: #2a2a2a; }
.gantt thead th.name-h { text-align: left; padding: 5px 10px; width: 132px; min-width: 132px; }

.pri-sep td {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; padding: 4px 10px;
}
.stage-sep td {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; padding: 4px 10px;
}
.char-row td { height: 32px; vertical-align: middle; }

.name-cell {
  padding: 0 10px; white-space: nowrap; min-width: 132px; width: 132px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--text); background: var(--surface);
}
.day-cell { width: 26px; min-width: 26px; padding: 0; position: relative; vertical-align: middle; height: 32px; }
.day-cell.we { background: rgba(255,255,255,.015); }
.day-cell.drop-target { outline: 2px dashed var(--pink); outline-offset: -2px; }

.bar-wrap {
  position: absolute; top: 3px; height: 26px; z-index: 2;
  cursor: grab; user-select: none;
}
.bar-wrap:active { cursor: grabbing; }
.bar-wrap.dragging { opacity: .35; }
.bar-inner {
  width: 100%; height: 100%; border-radius: 3px;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: .04em; pointer-events: none; white-space: nowrap;
}
.bar-delete {
  position: absolute; top: -4px; right: -4px; width: 14px; height: 14px;
  border-radius: 50%; background: #ff3366; border: 1.5px solid #0a0a0a;
  color: #fff; font-size: 9px; font-weight: 700; line-height: 11px; text-align: center;
  cursor: pointer; z-index: 10; pointer-events: all;
  opacity: 0; transition: opacity .15s;
}
.bar-wrap:hover .bar-delete { opacity: 1; }
.leg {
  cursor: grab;
}
.leg:active { cursor: grabbing; opacity: .7; }
.leg.leg-dragging { opacity: .4; }
.resize-handle {
  position: absolute; right: 0; top: 0; width: 7px; height: 100%;
  cursor: col-resize; z-index: 3; pointer-events: all; border-radius: 0 3px 3px 0;
}
.resize-handle:hover { background: rgba(255,255,255,.2); }
.resize-handle-left {
  position: absolute; left: 0; top: 0; width: 7px; height: 100%;
  cursor: col-resize; z-index: 3; pointer-events: all; border-radius: 3px 0 0 3px;
}
.resize-handle-left:hover { background: rgba(255,255,255,.2); }

.stage-data-row td { height: 26px; vertical-align: middle; }
.stage-data-cell { width: 26px; min-width: 26px; padding: 0; position: relative; height: 26px; border: 1px solid var(--border); }
.stage-data-cell.we { background: rgba(255,255,255,.015); }

.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--surface2); border: 1px solid var(--border-strong); color: var(--text);
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; letter-spacing: .04em;
  padding: 9px 16px; border-radius: 5px;
  opacity: 0; transform: translateY(6px); transition: all .22s;
  pointer-events: none; z-index: 9999;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.err { border-color: #D85A30; color: #e8845e; }
.hidden-row { display: none; }

@media print {
  @page { size: A3 landscape; margin: 8mm; }
  header, .controls, .legend, .toast { display: none !important; }
  body { background: #fff !important; color: #000 !important; }
  .gantt-wrap { overflow: visible; transform-origin: top left; }
  table.gantt { min-width: unset; width: 100%; }
  .name-cell { background: #f4f4f4 !important; color: #000 !important; }
  .gantt thead th { background: #eee !important; color: #333 !important; border-color: #ccc !important; }
  .gantt td { border-color: #ccc !important; }
  .bar-inner { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .bar-inner, .delivery-bar { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .resize-handle, .resize-handle-left, .bar-delete, .del-btn { display: none !important; }
  .delivery-add-btn { display: none !important; }
}

.delivery-sep td {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; padding: 4px 10px;
  background: #1a1a2e; color: #9999ff; border-color: #333366;
}
.delivery-row td { height: 32px; vertical-align: middle; border: 1px solid var(--border); }
.delivery-cell { width: 26px; min-width: 26px; padding: 0; position: relative; height: 32px; }
.delivery-cell.we { background: rgba(255,255,255,.015); }
.delivery-cell.drop-target { outline: 2px dashed #9999ff; outline-offset: -2px; }
.delivery-bar {
  position: absolute; top: 3px; height: 26px; left: 1px;
  border-radius: 3px; display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: .05em; z-index: 2; cursor: grab; user-select: none;
  background: #4444aa; color: #ccccff; border: 1px solid #6666cc;
}
.delivery-bar:active { cursor: grabbing; }
.delivery-bar .del-btn {
  position: absolute; top: -4px; right: -4px; width: 14px; height: 14px;
  border-radius: 50%; background: #ff3366; border: 1.5px solid #0a0a0a;
  color: #fff; font-size: 9px; font-weight: 700; line-height: 11px; text-align: center;
  cursor: pointer; z-index: 10; opacity: 0; transition: opacity .15s; pointer-events: all;
}
.delivery-bar:hover .del-btn { opacity: 1; }
.delivery-add-btn {
  font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  padding: 3px 12px; border-radius: 4px; border: 1px solid #444488;
  background: transparent; color: #7777cc; cursor: pointer; transition: all .15s; margin-left: 8px;
}
.delivery-add-btn:hover { background: rgba(100,100,200,.15); border-color: #9999ff; color: #9999ff; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<header>
  <div class="header-left">
    <h1>Tuning In <span>—</span> Production Calendar</h1>
    <p>8 weeks · 14 characters · Drag bars to move · Resize edges to adjust · Drag from legend to create · Hover bar for delete</p>
  </div>
  <div class="header-right">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Loading...</span>
    </div>
    <button class="btn" onclick="loadFromGitHub()">↺ Sync</button>

const STAGES = {

const DEFAULT_CHARS = [

    {proc:'brush',w:4,d0:0,d1:4},{proc:'expr',w:5,d0:0,d1:4},{proc:'vestuario',w:6,d0:0,d1:4},
    {proc:'lora',w:7,d0:0,d1:4},{proc:'clips',w:8,d0:0,d1:4}]},
  { name:'Kay',             p:'P2', tasks:[

  { name:'Evie',            p:'P2', tasks:[

  { name:'Pip-Pop',         p:'P2', tasks:[

    {proc:'brush',w:6,d0:0,d1:4},{proc:'expr',w:7,d0:0,d1:4},{proc:'clips',w:8,d0:0,d1:4}]},
  { name:'Miles',           p:'P2', tasks:[

  { name:'Harmony',         p:'P3', tasks:[

  { name:'Swing',           p:'P3', tasks:[

  { name:'Mc Flow',         p:'P3', tasks:[

  { name:'Mama Hallelujah', p:'P3', tasks:[
    {proc:'pencil',w:7,d0:0,d1:4},{proc:'color1',w:8,d0:0,d1:4}]},
];

let chars = JSON.parse(JSON.stringify(DEFAULT_CHARS));
let activeFilters = new Set(['P1','P2','P3']);



function getDate(weekIdx, dayIdx) {
  const d = new Date(START);
  d.setDate(d.getDate() + weekIdx * 7 + dayIdx);
  return d;
}
function isWE(d) { return d.getDay() === 0 || d.getDay() === 6; }
function wdToAbs(w, d) { return (w - 1) * 7 + d; }
function absToWD(abs) { return { w: Math.floor(abs / 7) + 1, d: abs % 7 }; }

// Stage spans auto-calculated from task data
function buildStageSpans() {
  const spans = {};
  ['design','lora','anim'].forEach(stageKey => {
    spans[stageKey] = {};
    // Find absolute earliest and latest day across ALL weeks for this stage
    let minAbs = Infinity, maxAbs = -Infinity;
    chars.forEach(c => c.tasks.forEach(t => {
      if (PROC[t.proc] && PROC[t.proc].stage === stageKey) {
        const absStart = wdToAbs(t.w, t.d0);
        const absEnd   = wdToAbs(t.w, t.d1);
        if (absStart < minAbs) minAbs = absStart;
        if (absEnd   > maxAbs) maxAbs = absEnd;
      }
    }));
    if (minAbs === Infinity) return;
    // Store as a single continuous span across all weeks
    spans[stageKey] = { absStart: minAbs, absEnd: maxAbs };
  });
  return spans;
}
let stageSpans = {};
let deliveries = []; // [{week, label}]

function setSyncStatus(state, label) {
  document.getElementById('syncDot').className = 'sync-dot ' + state;
  document.getElementById('syncLabel').textContent = label;
}
function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 3000);
}

async function loadFromGitHub() {
  setSyncStatus('syncing', 'Syncing...');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const decoded = json.record;
    if (decoded.chars && decoded.chars.length > 0) {
      chars = decoded.chars;
    } else {
      chars = JSON.parse(JSON.stringify(DEFAULT_CHARS));
    }
    if (decoded.deliveries) deliveries = decoded.deliveries;
    setSyncStatus('ok', 'Synced · ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}));
    showToast('Data loaded');
    renderGantt();
  } catch(e) {
    setSyncStatus('error', 'Load error');
    showToast('Error: ' + e.message, true);
    renderGantt();
  }
}

async function saveToGitHub() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  setSyncStatus('syncing', 'Saving...');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
      body: JSON.stringify({ chars, deliveries, savedAt: new Date().toISOString() })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'HTTP ' + res.status); }
    setSyncStatus('ok', 'Saved · ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}));
    showToast('Saved');
  } catch(e) {
    setSyncStatus('error', 'Save error');
    showToast('Error: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = '↑ Save';
  }
}

function toggleFilter(p, btn) {
  if (activeFilters.has(p)) {
    if (activeFilters.size === 1) return;
    activeFilters.delete(p);
    btn.className = 'pill';
  } else {
    activeFilters.add(p);
    btn.className = 'pill a' + p.toLowerCase();
  }
  document.querySelectorAll('[data-prow]').forEach(el =>
    el.classList.toggle('hidden-row', !activeFilters.has(el.dataset.prow))
  );
}

function renderGantt() {
  const head = document.getElementById('ganttHead');
  const body = document.getElementById('ganttBody');
  head.innerHTML = ''; body.innerHTML = '';

  // Week header row
  const r1 = head.insertRow();
  const nTh = document.createElement('th');
  nTh.rowSpan = 2; nTh.className = 'name-h'; nTh.textContent = 'Character';
  r1.appendChild(nTh);
  for (let w = 0; w < WEEKS; w++) {
    const wS = new Date(START); wS.setDate(wS.getDate() + w*7);
    const wE = new Date(wS); wE.setDate(wE.getDate() + 4);
    const fmt = d => (d.getMonth()+1) + '/' + d.getDate();
    const th = document.createElement('th');
    th.colSpan = 7; th.className = 'wk';
    th.textContent = `W${w+1}  ${fmt(wS)}–${fmt(wE)}`;
    r1.appendChild(th);
  }

  // Day labels row
  const r2 = head.insertRow();
  for (let w = 0; w < WEEKS; w++) {
    for (let d = 0; d < 7; d++) {
      const th = document.createElement('th');
      th.className = 'day' + (d >= 5 ? ' we' : '');
      th.textContent = DAY_LABELS[d];
      r2.appendChild(th);
    }
  }

  // Character rows with priority separators
  let lastP = null;
  chars.forEach((char, ci) => {
    if (char.p !== lastP) {
      lastP = char.p;
      const pc = PCOLORS[char.p];
      const sr = body.insertRow(); sr.className = 'pri-sep'; sr.dataset.prow = char.p;
      if (!activeFilters.has(char.p)) sr.classList.add('hidden-row');
      const td = sr.insertCell(); td.colSpan = 1 + WEEKS*7;
      td.style.cssText = `background:${pc.bg};border-color:${pc.border};color:${pc.text}`;
      td.textContent = pc.label;
    }

    const tr = body.insertRow(); tr.className = 'char-row'; tr.dataset.prow = char.p; tr.dataset.ci = ci;
    if (!activeFilters.has(char.p)) tr.classList.add('hidden-row');

    const nc = tr.insertCell(); nc.className = 'name-cell'; nc.textContent = char.name;

    for (let abs = 0; abs < WEEKS*7; abs++) {
      const td = tr.insertCell();
      const {w, d} = absToWD(abs);
      const date = getDate(w-1, d);
      td.className = 'day-cell' + (isWE(date) ? ' we' : '');
      td.dataset.abs = abs;
      td.addEventListener('dragover', e => { e.preventDefault(); td.classList.add('drop-target'); });
      td.addEventListener('dragleave', () => td.classList.remove('drop-target'));
      td.addEventListener('drop', e => handleDrop(e, ci, abs));
    }

    char.tasks.forEach((task, ti) => placeBar(tr, ci, ti, task));
  });

  // Deliveries section
  const delSepRow = body.insertRow(); delSepRow.className = 'delivery-sep';
  const delSepTd = delSepRow.insertCell(); delSepTd.colSpan = 1 + WEEKS*7;
  const addBtn = document.createElement('button');
  addBtn.className = 'delivery-add-btn';
  addBtn.textContent = '+ Add delivery';
  addBtn.onclick = () => {
    const n = deliveries.length + 1;
    deliveries.push({ week: 1, label: 'Round ' + n });
    renderGantt();
  };
  delSepTd.appendChild(document.createTextNode('Deliveries  '));
  delSepTd.appendChild(addBtn);

  const delDataRow = body.insertRow(); delDataRow.className = 'delivery-row';
  const delNameTd = delDataRow.insertCell(); delNameTd.className = 'name-cell';
  delNameTd.style.cssText = 'font-size:10px;color:#555;font-family:"Barlow Condensed",sans-serif';

  for (let abs = 0; abs < WEEKS*7; abs++) {
    const {w, d} = absToWD(abs);
    const date = getDate(w-1, d);
    const td = delDataRow.insertCell();
    td.className = 'delivery-cell' + (isWE(date) ? ' we' : '');
    td.addEventListener('dragover', e => { e.preventDefault(); td.classList.add('drop-target'); });
    td.addEventListener('dragleave', () => td.classList.remove('drop-target'));
    td.addEventListener('drop', e => {
      e.preventDefault();
      td.classList.remove('drop-target');
      let data; try { data = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
      if (data.deliveryIdx === undefined) return;
      const {w: tgtW} = absToWD(abs);
      deliveries[data.deliveryIdx].week = tgtW;
      renderGantt();
    });

    // Place delivery bar at Monday of its week
    deliveries.forEach((del, di) => {
      if (del.week === w && d === 0) {
        const bar = document.createElement('div');
        bar.className = 'delivery-bar';
        bar.style.width = (5 * CELL_W - 2) + 'px';
        bar.draggable = true;
        bar.textContent = del.label;
        bar.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', JSON.stringify({ deliveryIdx: di }));
          e.dataTransfer.effectAllowed = 'move';
        });
        const delBtn = document.createElement('div');
        delBtn.className = 'del-btn';
        delBtn.textContent = '×';
        delBtn.onclick = e => { e.stopPropagation(); deliveries.splice(di, 1); renderGantt(); };
        bar.appendChild(delBtn);
        td.style.position = 'relative';
        td.appendChild(bar);
      }
    });
  }
}

function placeBar(tr, ci, ti, task) {
  const startAbs = wdToAbs(task.w, task.d0);
  const spanDays = task.d1 - task.d0 + 1;
  const anchorCell = tr.cells[startAbs + 1];
  if (!anchorCell) return;

  const p = PROC[task.proc];
  const wrap = document.createElement('div');
  wrap.className = 'bar-wrap';
  wrap.draggable = true;
  wrap.style.cssText = `left:1px;width:${spanDays * CELL_W - 2}px`;

  const inner = document.createElement('div');
  inner.className = 'bar-inner';
  inner.style.background = p.color;
  inner.style.color = p.text;
  inner.textContent = p.label;
  wrap.appendChild(inner);

  const handle = document.createElement('div');
  handle.className = 'resize-handle';
  wrap.appendChild(handle);

  const handleL = document.createElement('div');
  handleL.className = 'resize-handle-left';
  wrap.appendChild(handleL);

  // Drag to move
  wrap.addEventListener('dragstart', e => {
    if (e.target === handle || e.target === handleL) { e.preventDefault(); return; }
    e.dataTransfer.setData('text/plain', JSON.stringify({ci, ti}));
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => wrap.classList.add('dragging'), 0);
  });
  wrap.addEventListener('dragend', () => {
    wrap.classList.remove('dragging');
    document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
  });

  // Right resize — Mon–Fri only, max day 4
  handle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX;
    const origD1 = task.d1;
    function onMove(ev) {
      const delta = Math.round((ev.clientX - startX) / CELL_W);
      const newD1 = Math.max(task.d0, Math.min(4, origD1 + delta));
      if (newD1 !== task.d1) {
        task.d1 = newD1;
        wrap.style.width = ((newD1 - task.d0 + 1) * CELL_W - 2) + 'px';
      }
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      renderGantt();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Left resize — moves start day, min day 0, max = d1
  handleL.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX;
    const origD0 = task.d0;
    function onMove(ev) {
      const delta = Math.round((ev.clientX - startX) / CELL_W);
      const newD0 = Math.max(0, Math.min(task.d1, origD0 + delta));
      if (newD0 !== task.d0) {
        task.d0 = newD0;
        // Reposition and resize the wrap visually
        wrap.style.left = (newD0 - origD0) * CELL_W + 'px';
        wrap.style.width = ((task.d1 - task.d0 + 1) * CELL_W - 2) + 'px';
      }
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      renderGantt();
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Delete button
  const del = document.createElement('div');
  del.className = 'bar-delete';
  del.textContent = '×';
  del.addEventListener('click', e => {
    e.stopPropagation();
    chars[ci].tasks.splice(ti, 1);
    showToast(`${chars[ci].name}: ${p.label} removed`);
    renderGantt();
  });
  wrap.appendChild(del);

  anchorCell.style.position = 'relative';
  anchorCell.appendChild(wrap);
}

function handleDrop(e, ci, targetAbs) {
  e.preventDefault();
  document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
  let data;
  try { data = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }

  const {w: tgtW, d: tgtD} = absToWD(targetAbs);
  if (isWE(getDate(tgtW-1, tgtD))) { showToast('Cannot drop on weekend', true); return; }

  // Drop from legend — create new task
  if (data.fromLegend) {
    const proc = data.proc;
    // Remove existing task of same proc+week if any (overwrite)
    chars[ci].tasks = chars[ci].tasks.filter(t => !(t.w === tgtW && t.proc === proc));
    chars[ci].tasks.push({ proc, w: tgtW, d0: 0, d1: 4 });
    showToast(`${chars[ci].name}: ${PROC[proc].label} added to W${tgtW}`);
    renderGantt();
    return;
  }

  // Drop from existing bar — move
  const { ci: srcCi, ti } = data;
  if (srcCi !== ci) { showToast('Tasks can only be moved within the same character', true); return; }
  const task = chars[ci].tasks[ti];
  const span = task.d1 - task.d0;
  task.w = tgtW; task.d0 = tgtD; task.d1 = Math.min(tgtD + span, 4);
  showToast(`${chars[ci].name}: ${PROC[task.proc].label} moved`);
  renderGantt();
}

function initLegendDrag() {
  document.querySelectorAll('#legend .leg').forEach(el => {
    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', JSON.stringify({ fromLegend: true, proc: el.dataset.proc }));
      e.dataTransfer.effectAllowed = 'copy';
      el.classList.add('leg-dragging');
    });
    el.addEventListener('dragend', () => el.classList.remove('leg-dragging'));
  });
}

loadFromGitHub();
initLegendDrag();
</script>
